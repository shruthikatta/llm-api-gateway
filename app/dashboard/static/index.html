<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM API Gateway — Admin Dashboard</title>
  <link rel="stylesheet" href="/dashboard/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">AG</div>
        <div>
          <h1>LLM API Gateway</h1>
          <p>Operations Console</p>
        </div>
      </div>
      <nav>
        <button class="nav-item active" data-view="overview">Overview</button>
        <button class="nav-item" data-view="teams">Teams & Budget</button>
        <button class="nav-item" data-view="providers">Providers</button>
        <button class="nav-item" data-view="audit">Audit Log</button>
        <button class="nav-item" data-view="alerts">Alerts</button>
      </nav>
      <div class="sidebar-footer">
        <label for="api-key">Admin API Key</label>
        <input id="api-key" type="password" placeholder="Bearer token" autocomplete="off" />
        <button id="connect-btn" class="primary">Connect</button>
        <p id="connection-status" class="muted">Not connected</p>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h2 id="view-title">Overview</h2>
          <p id="view-subtitle">Platform usage, cost, and latency</p>
        </div>
        <div class="topbar-actions">
          <label>
            Period
            <select id="period-days">
              <option value="7" selected>7 days</option>
              <option value="14">14 days</option>
              <option value="30">30 days</option>
            </select>
          </label>
          <button id="refresh-btn" class="ghost">Refresh</button>
        </div>
      </header>

      <div id="error-banner" class="error-banner hidden"></div>

      <section id="view-overview" class="view active">
        <div class="stat-grid" id="overview-stats"></div>
        <div class="panel-grid">
          <article class="panel">
            <h3>Requests & Cost</h3>
            <canvas id="timeseries-chart" height="220"></canvas>
          </article>
          <article class="panel">
            <h3>Top Models</h3>
            <div id="top-models" class="table-wrap"></div>
          </article>
        </div>
        <article class="panel">
          <h3>Latency Percentiles</h3>
          <div id="latency-stats" class="stat-grid compact"></div>
        </article>
      </section>

      <section id="view-teams" class="view">
        <div id="team-list" class="panel-grid"></div>
      </section>

      <section id="view-providers" class="view">
        <div id="provider-cards" class="provider-grid"></div>
      </section>

      <section id="view-audit" class="view">
        <article class="panel">
          <h3>Recent Audit Events</h3>
          <div id="audit-table" class="table-wrap"></div>
        </article>
      </section>

      <section id="view-alerts" class="view">
        <article class="panel">
          <h3>Alerting Configuration</h3>
          <div id="alert-config" class="alert-config"></div>
          <button id="test-alert-btn" class="primary">Send Test Alert</button>
          <p id="alert-result" class="muted"></p>
        </article>
      </section>
    </main>
  </div>

  <script src="/dashboard/app.js"></script>
</body>
</html>
